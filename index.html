<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="overlay">
        <div class="card">
            <p class="subtitle">THE NOBLE UNION</p>

            <h1 class="title">
                Bagus<span>&</span>Lutfya
            </h1>

            <p class="date">Sabtu · 23 Mei 2026</p>

            <div class="divider"></div>

            <p class="invite-text">Dengan hormat mengundang</p>
            <h2 class="guest" id="nama-tamu">Tamu Undangan</h2>

            <!-- BUTTON -->
            <button class="btn" id="openInvitation">
                Buka Undangan
            </button>

            <p class="note">
                Mohon maaf apabila terdapat kesalahan penulisan nama dan gelar
            </p>
        </div>
    </div>


    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const urlParams = new URLSearchParams(window.location.search);
            const namaTamu = urlParams.get('nama');
            const guestElement = document.getElementById("nama-tamu");

            if (namaTamu) {
                guestElement.innerText = decodeURIComponent(namaTamu);
            }

            const btn = document.getElementById("openInvitation");
            btn.addEventListener("click", function () {
                document.body.classList.add("fade-out");

                setTimeout(() => {
                    if (namaTamu) {
                        window.location.href = "Halaman.html?nama=" + encodeURIComponent(namaTamu);
                    } else {
                        window.location.href = "Halaman.html";
                    }
                }, 1000);
            });
        });
    </script>

</body>
</html>
